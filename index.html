<!DOCTYPE html>
<html>
<head>
  <title>Mi Asistente IA</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
    .chat-container { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 20px; margin: 20px 0; }
    input { width: 70%; padding: 12px; }
    button { width: 25%; padding: 12px; background: #0078d4; color: white; border: none; }
    .message { margin: 10px 0; padding: 10px; border-radius: 10px; }
    .user { background: #e3f2fd; }
    .ai { background: #f3f3f3; }
  </style>
</head>
<body>
  <h1>Mi Asistente IA (Foundry)</h1>

  <div id="chat" class="chat-container"></div>

  <input id="messageInput" type="text" placeholder="Pregunta algo">
  <button onclick="sendMessage()">Enviar</button>

  <script>
    const API_KEY = "8ipmbaynLUsgxZidIY3wqpk9ZfOD0WZ4iP6n8Vz0R7mqPO79DbkaJQQJ99CGAC5RqLJXJ3w3AAAAACOGVpae";
    const ENDPOINT = "https://juanlu1.services.ai.azure.com/openai/v1/";
    const MODEL = "DeepSeek-V3.2";

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const userMessage = input.value.trim();
      if (!userMessage) return;

      input.value = '';
      addMessage('Tú', userMessage, 'user');

      try {
        const response = await fetch(`${ENDPOINT}chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'api-key': API_KEY,
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: "system", content: "Eres un asistente útil y respondes en español de forma breve." },
              { role: "user", content: userMessage }
            ],
            max_tokens: 500,
            temperature: 0.7
          })
        });

        const text = await response.text();

        if (!response.ok) {
          addMessage('❌', `Error ${response.status}: ${text.substring(0, 300)}`, 'ai');
          return;
        }

        const data = JSON.parse(text);
        const reply = data.choices?.[0]?.message?.content || "(Sin respuesta)";
        addMessage('🤖 IA', reply, 'ai');
      } catch (error) {
        addMessage('❌', 'Error de conexión', 'ai');
      }
    }

    function addMessage(sender, text, type) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<strong>${sender}:</strong> ${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
