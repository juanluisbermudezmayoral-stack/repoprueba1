<!DOCTYPE html>
<html>
<head>
  <title>Mi Asistente IA</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
    .chat-container { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 20px; margin: 20px 0; }
    input { width: 70%; padding: 12px; }
    button { width: 25%; padding: 12px; background: #0078d4; color: white; border: none; }
    .message { margin: 10px 0; padding: 10px; border-radius: 10px; }
    .user { background: #e3f2fd; }
    .ai { background: #f3f3f3; }
  </style>
</head>
<body>
  <h1>Mi Asistente IA</h1>
  <div id="chat" class="chat-container"></div>
  <input id="messageInput" type="text" placeholder="Pregunta algo">
  <button onclick="sendMessage()">Enviar</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const userMessage = input.value.trim();
      if (!userMessage) return;

      input.value = '';
      addMessage('Tú', userMessage, 'user');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userMessage })
        });

        const data = await response.json();
        if (!response.ok) {
          addMessage('❌', data.error || 'Error de conexión', 'ai');
          return;
        }

        addMessage('🤖 IA', data.reply || '(Sin respuesta)', 'ai');
      } catch (error) {
        addMessage('❌', 'Error de conexión', 'ai');
      }
    }

    function addMessage(sender, text, type) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<strong>${sender}:</strong> ${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
